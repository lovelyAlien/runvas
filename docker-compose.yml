services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: runvas
      POSTGRES_PASSWORD: runvas
      POSTGRES_DB: runvas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runvas"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
