<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Runvas 관리자 - 코스</title>
    <link rel="stylesheet" th:href="@{/admin/assets/admin.css}"/>
</head>
<body>
<div class="admin-shell">
    <nav th:replace="~{admin/fragments/nav :: nav}"></nav>
    <h1>코스 목록</h1>
    <form method="get" th:action="@{/admin/courses}" class="field-row">
        <input type="text" name="q" th:value="${q}" placeholder="제목 검색"/>
        <select name="visibility">
            <option value="" th:selected="${visibility == null}">전체</option>
            <option value="PUBLIC" th:selected="${visibility != null and visibility.name() == 'PUBLIC'}">공개</option>
            <option value="PRIVATE" th:selected="${visibility != null and visibility.name() == 'PRIVATE'}">비공개</option>
        </select>
        <button type="submit" class="btn">검색</button>
    </form>
    <table>
        <colgroup>
            <col style="width:18%"/>
            <col style="width:22%"/>
            <col style="width:18%"/>
            <col style="width:10%"/>
            <col style="width:8%"/>
            <col style="width:24%"/>
        </colgroup>
        <thead>
        <tr>
            <th>ID</th>
            <th>제목</th>
            <th>작성자 ID</th>
            <th>공개범위</th>
            <th>좋아요 수</th>
            <th>생성일</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="course : ${courses}">
            <td class="mono" th:text="${course.id}" th:title="${course.id}"></td>
            <td th:text="${course.title}"></td>
            <td class="mono" th:text="${course.authorId}" th:title="${course.authorId}"></td>
            <td th:text="${course.visibility}"></td>
            <td class="mono" th:text="${course.likeCount}"></td>
            <td class="mono" th:text="${course.createdAt}"></td>
        </tr>
        </tbody>
    </table>
    <div class="pagination">
        <span class="mono" th:text="'페이지 ' + (${page} + 1) + ' / ' + ${totalPages}"></span>
        <a th:if="${page > 0}" th:href="@{/admin/courses(q=${q}, visibility=${visibility}, page=${page - 1})}">이전</a>
        <a th:if="${page + 1 < totalPages}" th:href="@{/admin/courses(q=${q}, visibility=${visibility}, page=${page + 1})}">다음</a>
    </div>
</div>
</body>
</html>
