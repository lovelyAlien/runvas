<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Runvas 관리자 대시보드</title>
    <link rel="stylesheet" th:href="@{/admin/assets/admin.css}"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="admin-shell">
    <nav th:replace="~{admin/fragments/nav :: nav}"></nav>
    <h1>대시보드</h1>
    <ul class="stat-readout">
        <li><span class="stat-label">전체 회원 수</span><span class="stat-value" th:text="${summary.totalUsers()}"></span></li>
        <li><span class="stat-label">공개 코스 수</span><span class="stat-value" th:text="${summary.publicCourses()}"></span></li>
        <li><span class="stat-label">비공개 코스 수</span><span class="stat-value" th:text="${summary.privateCourses()}"></span></li>
        <li><span class="stat-label">전체 게시글 수</span><span class="stat-value" th:text="${summary.totalPosts()}"></span></li>
        <li><span class="stat-label">전체 댓글 수</span><span class="stat-value" th:text="${summary.totalComments()}"></span></li>
    </ul>
    <div class="chart-shell">
        <canvas id="trendChart" width="800" height="300"></canvas>
    </div>
</div>
<script th:inline="javascript">
    const labels = /*[[${trendLabels}]]*/ [];
    const userSignups = /*[[${userSignupCounts}]]*/ [];
    const courseCreations = /*[[${courseCreationCounts}]]*/ [];
    const postCreations = /*[[${postCreationCounts}]]*/ [];

    new Chart(document.getElementById('trendChart'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                { label: '신규 가입자', data: userSignups, borderColor: '#4f6146' },
                { label: '신규 코스', data: courseCreations, borderColor: '#b5501e' },
                { label: '신규 게시글', data: postCreations, borderColor: '#7c8179' }
            ]
        }
    });
</script>
</body>
</html>
