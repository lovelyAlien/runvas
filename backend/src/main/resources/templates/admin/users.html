<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Runvas 관리자 - 회원</title>
    <link rel="stylesheet" th:href="@{/admin/assets/admin.css}"/>
</head>
<body>
<div class="admin-shell">
    <nav th:replace="~{admin/fragments/nav :: nav}"></nav>
    <h1>회원 목록</h1>
    <form method="get" th:action="@{/admin/users}" class="field-row">
        <input type="text" name="q" th:value="${q}" placeholder="닉네임 또는 이메일 검색"/>
        <button type="submit" class="btn">검색</button>
    </form>
    <table>
        <colgroup>
            <col style="width:22%"/>
            <col style="width:16%"/>
            <col style="width:26%"/>
            <col style="width:26%"/>
            <col style="width:10%"/>
        </colgroup>
        <thead>
        <tr>
            <th>ID</th>
            <th>닉네임</th>
            <th>이메일</th>
            <th>가입일</th>
            <th>탈퇴 여부</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td class="mono" th:text="${user.id}" th:title="${user.id}"></td>
            <td th:text="${user.nickname}"></td>
            <td th:text="${user.email}"></td>
            <td class="mono" th:text="${user.createdAt}"></td>
            <td th:text="${user.deletedAt != null ? '탈퇴' : '-'}"></td>
        </tr>
        </tbody>
    </table>
    <div class="pagination">
        <span class="mono" th:text="'페이지 ' + (${page} + 1) + ' / ' + ${totalPages}"></span>
        <a th:if="${page > 0}" th:href="@{/admin/users(q=${q}, page=${page - 1})}">이전</a>
        <a th:if="${page + 1 < totalPages}" th:href="@{/admin/users(q=${q}, page=${page + 1})}">다음</a>
    </div>
</div>
</body>
</html>
