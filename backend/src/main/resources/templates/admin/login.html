<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Runvas 관리자 로그인</title>
    <link rel="stylesheet" th:href="@{/admin/assets/admin.css}"/>
</head>
<body>
<div class="login-shell">
    <h1>Runvas 관리자 로그인</h1>
    <p class="login-error" th:if="${param.error}">아이디 또는 비밀번호가 올바르지 않습니다.</p>
    <form method="post" th:action="@{/admin/login}">
        <div class="field-row">
            <label>아이디 <input type="text" name="username"/></label>
            <label>비밀번호 <input type="password" name="password"/></label>
        </div>
        <button type="submit" class="btn">로그인</button>
    </form>
</div>
</body>
</html>
