server:
  port: ${SERVER_PORT:8921}

spring:
  application:
    name: runvas-backend
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/runvas}
    username: ${DATABASE_USERNAME:runvas}
    password: ${DATABASE_PASSWORD:runvas}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis

runvas:
  jwt:
    secret: ${JWT_SECRET}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
  kakao:
    token-uri: ${KAKAO_TOKEN_URI:https://kauth.kakao.com/oauth/token}
    user-info-uri: ${KAKAO_USER_INFO_URI:https://kapi.kakao.com/v2/user/me}
    unlink-uri: ${KAKAO_UNLINK_URI:https://kapi.kakao.com/v1/user/unlink}
    rest-api-key: ${KAKAO_REST_API_KEY:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    admin-key: ${KAKAO_ADMIN_KEY:}
  tmap:
    app-key: ${TMAP_APP_KEY:}
  upload:
    dir: ${UPLOAD_DIR:./uploads}
    base-url: ${UPLOAD_BASE_URL:http://localhost:8080}
  admin:
    seed-username: ${ADMIN_SEED_USERNAME:}
    seed-password: ${ADMIN_SEED_PASSWORD:}
