server:
  port: 8921
  servlet:
    context-path: /api

spring:
  application:
    name: runvas-backend
  # 시크릿(application-local.yml, gitignore 대상)을 프로필 지정 여부와 무관하게 항상 불러온다.
  # "dev"/"local" 프로필을 둘 다 켜야 했던 이전 구조에서, 하나를 빼먹어 키가 비는 사고가 있었다
  # (backend/docs/sessions/2026-06-27-pedestrian-routing-and-debugging.md 참고).
  config:
    import: optional:classpath:application-local.yml
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
  datasource:
    # 로컬 전용 Runvas MySQL 컨테이너 (다른 프로젝트의 MySQL과 분리):
    # docker run -d --name runvas-mysql -e MYSQL_ROOT_PASSWORD=runvas_dev_root \
    #   -e MYSQL_DATABASE=runvas -e MYSQL_USER=runvas -e MYSQL_PASSWORD=runvas_dev_password \
    #   -p 3308:3306 mysql:8.0 --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    url: jdbc:mysql://localhost:3308/runvas?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${RUNVAS_DB_USERNAME:runvas}
    password: ${RUNVAS_DB_PASSWORD:runvas_dev_password}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        type:
          descriptor:
            sql:
              BasicBinder: trace
  data:
    redis:
      # 전용 Runvas Redis 컨테이너 (다른 프로젝트의 Redis와 분리):
      # docker run -d --name runvas-redis -p 6380:6379 redis:7 redis-server --appendonly yes
      host: localhost
      port: 6380
  cache:
    type: redis

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    com.runvas.backend.routing: debug

runvas:
  jwt:
    secret: ${RUNVAS_JWT_SECRET:dev-only-secret-change-me-before-production-0123456789}
    expiration-seconds: 2592000
  kakao:
    client-id: ${RUNVAS_KAKAO_CLIENT_ID:}
    client-secret: ${RUNVAS_KAKAO_CLIENT_SECRET:}
  tmap:
    app-key: ${RUNVAS_TMAP_APP_KEY:}
