name: Backend Deploy

on:
  push:
    tags: ['backend-v*.*.*']

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker build \
            -t ghcr.io/lovelyalien/runvas-backend:latest \
            -t ghcr.io/lovelyalien/runvas-backend:${{ github.ref_name }} \
            ./backend
      - run: docker push ghcr.io/lovelyalien/runvas-backend:latest
      - run: docker push ghcr.io/lovelyalien/runvas-backend:${{ github.ref_name }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ vars.DEPLOY_PATH }}
            git fetch origin main
            git reset --hard origin/main
            docker compose -f ${{ vars.DEPLOY_PATH }}/docker-compose.yml --profile deploy pull backend
            docker compose -f ${{ vars.DEPLOY_PATH }}/docker-compose.yml --profile deploy up -d --no-build
